<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Foot Insolite</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<script src="/socket.io/socket.io.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#060a06;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;color:#fff;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:46px;letter-spacing:10px;margin-bottom:4px;}
.logo span{color:#2ecc4a;}
.tag{font-size:11px;letter-spacing:5px;color:rgba(255,255,255,0.2);margin-bottom:24px;}

#lobby{width:560px;display:flex;flex-direction:column;gap:16px;}

/* Lien */
#share-bar{display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(46,204,74,0.06);border:1px solid rgba(46,204,74,0.2);border-radius:8px;}
#share-url{font-size:11px;color:#2ecc4a;flex:1;word-break:break-all;}
#share-bar button{padding:5px 12px;background:transparent;border:1px solid rgba(46,204,74,0.3);border-radius:5px;color:#2ecc4a;font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:2px;cursor:pointer;}

/* Champs */
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-size:10px;letter-spacing:3px;color:rgba(255,255,255,0.3);text-transform:uppercase;}
input[type=text]{background:rgba(255,255,255,0.05);border:1.5px solid rgba(255,255,255,0.08);border-radius:8px;padding:9px 14px;font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;color:#fff;outline:none;width:200px;}
input[type=text]:focus{border-color:#2ecc4a;}
.row{display:flex;gap:8px;flex-wrap:wrap;}
.sc{padding:8px 14px;border-radius:8px;background:rgba(255,255,255,0.04);border:1.5px solid rgba(255,255,255,0.08);cursor:pointer;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;color:rgba(255,255,255,0.4);transition:all .15s;}
.sc:hover{color:#fff;}
.sc.sr{border-color:#e83030;color:#e83030;background:rgba(232,48,48,0.08);}
.sc.sb{border-color:#2e7fff;color:#2e7fff;background:rgba(46,127,255,0.08);}

/* Play */
#play-btn{padding:14px 0;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:6px;background:transparent;border:2px solid #2ecc4a;color:#2ecc4a;cursor:pointer;border-radius:10px;transition:all .2s;width:100%;margin-top:4px;}
#play-btn:hover{background:rgba(46,204,74,0.1);}

/* En ligne */
#online-box{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:12px 14px;}
#online-box h3{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:3px;color:rgba(255,255,255,0.3);margin-bottom:8px;}
#online-list{display:flex;flex-direction:column;gap:5px;min-height:24px;}
.op{font-size:12px;padding:4px 0;}
.op.rouge{color:#ff8888;}
.op.bleu{color:#88aaff;}
#online-empty{font-size:11px;color:rgba(255,255,255,0.2);letter-spacing:2px;}

/* ── IN-GAME ── */
#game-wrap{display:none;flex-direction:column;align-items:center;background:#000;width:100vw;min-height:100vh;justify-content:center;}
#game-container{display:flex;justify-content:center;align-items:center;}
#game-container canvas{display:block;}
#gtimer{position:absolute;top:8px;left:50%;transform:translateX(-50%);font-family:'Bebas Neue',sans-serif;font-size:22px;color:#fff;background:rgba(0,0,0,0.5);padding:4px 18px;border-radius:8px;z-index:50;pointer-events:none;letter-spacing:3px;}
#gcont{position:relative;}
#fsbtn{position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.12);border-radius:6px;color:rgba(255,255,255,0.4);font-size:15px;cursor:pointer;padding:4px 8px;z-index:50;}
#chat-box{position:absolute;bottom:8px;right:8px;width:200px;display:flex;flex-direction:column;z-index:50;}
#chat-msgs{height:90px;overflow-y:auto;display:flex;flex-direction:column;gap:2px;padding:5px 7px;background:rgba(0,0,0,0.55);border-radius:7px 7px 0 0;pointer-events:none;}
.cl{font-size:10px;line-height:1.3;word-break:break-word;}
.cl .cn{font-weight:700;margin-right:3px;}
.cl.rouge .cn{color:#ff7777;}
.cl.bleu  .cn{color:#77aaff;}
.cl.sys{color:rgba(255,255,255,0.3);font-style:italic;}
#chat-row{display:flex;}
#chat-in{flex:1;background:rgba(0,0,0,0.65);border:1px solid rgba(255,255,255,0.1);border-right:none;border-radius:0 0 0 7px;padding:5px 8px;color:#fff;font-family:'Rajdhani',sans-serif;font-size:11px;outline:none;}
#chat-in::placeholder{color:rgba(255,255,255,0.2);}
#chat-send{padding:0 9px;background:rgba(46,204,74,0.18);border:1px solid rgba(46,204,74,0.25);border-radius:0 0 7px 0;color:#2ecc4a;font-family:'Bebas Neue',sans-serif;font-size:12px;cursor:pointer;}
#hint{display:none;font-size:10px;letter-spacing:3px;color:rgba(255,255,255,0.15);text-transform:uppercase;margin-top:6px;}
</style>
</head>
<body>

<div id="lobby">
  <div class="logo">FOOT <span>INSOLITE</span></div>
  <div class="tag">Le beau jeu, en mode insolite</div>

  <div id="share-bar">
    <span style="font-size:10px;letter-spacing:2px;color:rgba(255,255,255,0.3);">LIEN :</span>
    <span id="share-url"></span>
    <button onclick="copyLink()">📋 Copier</button>
  </div>

  <div class="field">
    <label>Pseudo</label>
    <input type="text" id="pseudo" maxlength="14" placeholder="Ton pseudo…"/>
  </div>

  <div class="field">
    <label>Équipe — choisissez des équipes différentes !</label>
    <div class="row">
      <div class="sc sr" data-t="rouge" onclick="selTeam(this)">🔴 ROUGE</div>
      <div class="sc"    data-t="bleu"  onclick="selTeam(this)">🔵 BLEU</div>
    </div>
  </div>

  <div id="online-box">
    <h3>JOUEURS EN LIGNE</h3>
    <div id="online-list">
      <div id="online-empty">Aucun joueur connecté</div>
    </div>
  </div>

  <button id="play-btn" onclick="startGame()">⚽ JOUER</button>
</div>

<div id="game-wrap">
  <div id="gcont">
    <div id="game-container"></div>
    <div id="gtimer">5:00</div>
    <button id="fsbtn" onclick="toggleFS()">⛶</button>
    <div id="chat-box">
      <div id="chat-msgs"></div>
      <div id="chat-row">
        <input type="text" id="chat-in" maxlength="80" placeholder="Message…" autocomplete="off"/>
        <button id="chat-send" onclick="sendChat()">→</button>
      </div>
    </div>
  </div>
  <div id="hint">ESPACE · Tir | CLIC · Vers curseur | E · Lob | F · Dribble | SHIFT · Sprint</div>
</div>

<script>
const socket = io();
let playerTeam = 'rouge';

// Lien
document.getElementById('share-url').textContent = window.location.origin;
function copyLink(){
    navigator.clipboard.writeText(window.location.origin);
    document.querySelector('#share-bar button').textContent='✓ Copié !';
    setTimeout(()=>document.querySelector('#share-bar button').textContent='📋 Copier',2000);
}

function selTeam(el){
    playerTeam=el.dataset.t;
    document.querySelectorAll('[data-t]').forEach(e=>e.className='sc');
    el.classList.add(playerTeam==='rouge'?'sr':'sb');
}

// Joueurs en ligne
const onlinePlayers={};
function refreshOnline(){
    const list=document.getElementById('online-list');
    const empty=document.getElementById('online-empty');
    list.querySelectorAll('.op').forEach(e=>e.remove());
    const cnt=Object.keys(onlinePlayers).length;
    if(cnt===0){empty.style.display='block';return;}
    empty.style.display='none';
    Object.values(onlinePlayers).forEach(p=>{
        const el=document.createElement('div');
        el.className='op '+(p.team||'');
        el.textContent=(p.team==='rouge'?'🔴 ':'🔵 ')+p.pseudo;
        list.appendChild(el);
    });
}
socket.on('player_joined',p=>{onlinePlayers[p.id]=p;refreshOnline();addSys(p.pseudo+' a rejoint');});
socket.on('player_left', p=>{delete onlinePlayers[p.id];refreshOnline();addSys(p.pseudo+' est parti');});

// Chat
const chatIn=document.getElementById('chat-in');
const chatMsgs=document.getElementById('chat-msgs');
chatIn.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();sendChat();}});
chatIn.addEventListener('focus',()=>{if(window._kc)window._kc(false);});
chatIn.addEventListener('blur', ()=>{if(window._kc)window._kc(true);});
function sendChat(){const m=chatIn.value.trim();if(!m)return;socket.emit('chat_msg',{pseudo:document.getElementById('pseudo').value.trim()||'Joueur',msg:m,team:playerTeam});chatIn.value='';}
socket.on('chat_msg',({pseudo,msg,team})=>{const l=document.createElement('div');l.className='cl '+(team||'');l.innerHTML='<span class="cn">'+pseudo+'</span><span>'+msg+'</span>';chatMsgs.appendChild(l);chatMsgs.scrollTop=chatMsgs.scrollHeight;});
function addSys(t){const l=document.createElement('div');l.className='cl sys';l.textContent=t;chatMsgs.appendChild(l);chatMsgs.scrollTop=chatMsgs.scrollHeight;}

// Timer
socket.on('timer_tick',t=>{const m=Math.floor(t/60),s=String(t%60).padStart(2,'0');const el=document.getElementById('gtimer');el.textContent=m+':'+s;el.style.color=t<=30?'#ff4444':'#fff';});
socket.on('game_over',()=>document.getElementById('gtimer').textContent='FIN');

function toggleFS(){if(!document.fullscreenElement)document.documentElement.requestFullscreen?.();else document.exitFullscreen?.();}

function startGame(){
    const pseudo=document.getElementById('pseudo').value.trim()||'Joueur';
    document.getElementById('lobby').style.display='none';
    document.getElementById('game-wrap').style.display='flex';
    document.getElementById('hint').style.display='block';
    document.getElementById('gtimer').textContent='5:00';
    socket.emit('join',{pseudo,team:playerTeam,poste:'attaquant',celeb:'cool',dribble:'virgule',timerMax:300});
    initGame(pseudo, playerTeam, socket);
}
</script>
<script src="game.js"></script>
</body>
</html>
